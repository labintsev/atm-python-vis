<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Визуализация расписания радиостанций{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f2f3f5;
            color: #111;
        }

        body {
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            border-radius: 10px;
            padding: 24px;
        }

        header {
            margin-bottom: 24px;
            border-bottom: 1px solid #e2e2e2;
            padding-bottom: 16px;
        }

        h1 {
            font-size: 28px;
            color: #111;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 18px;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            background: #f2f3f5;
            border-radius: 6px;
            font-size: 14px;
        }

        .logout-btn {
            padding: 8px 14px;
            background: #d32f2f;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s ease;
        }

        .logout-btn:hover {
            background: #b71c1c;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #fff;
            color: #111;
            border: 1px solid #ccc;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .back-link:hover {
            background: #f7f7f7;
            border-color: #bbb;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }

        input[type="date"],
        input[type="text"],
        select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            color: #111;
            transition: border-color 0.2s ease;
        }

        input[type="date"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #888;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.06);
        }

        button {
            padding: 12px 18px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #333;
        }

        button:active {
            transform: none;
        }

        .radios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .radio-button {
            padding: 14px 16px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 8px;
            color: #111;
            text-align: center;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s ease, border-color 0.2s ease;
        }

        .radio-button:hover {
            background: #f7f7f7;
            border-color: #999;
        }

        .radio-id {
            display: block;
            margin-top: 6px;
            font-size: 12px;
            color: #666;
        }

        .graph-container {
            margin-top: 20px;
            padding: 0;
            background: transparent;
            border: none;
        }

        .no-data {
            padding: 28px;
            text-align: center;
            color: #666;
            font-size: 15px;
        }

        .error-message,
        .success-message {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .error-message {
            background: #fff1f0;
            color: #9b1c1c;
            border: 1px solid #ebb3b1;
        }

        .success-message {
            background: #eff7ee;
            color: #1f6b2e;
            border: 1px solid #b3d6b5;
        }

        .info-text {
            color: #666;
            font-size: 13px;
            margin-top: 8px;
        }

        footer {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #e8e8e8;
            text-align: center;
            color: #666;
            font-size: 13px;
        }

        .plotly-graph-div,
        .js-plotly-plot {
            max-width: 100% !important;
        }

        @media (max-width: 768px) {
            .container {
                padding: 18px;
            }

            h1 {
                font-size: 24px;
            }

            .radios-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .header-nav {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">



        {% block content %}{% endblock %}
        <footer>
            <p>Визуализация расписания радиостанций ATM © 2026</p>
        </footer>
    </div>
</body>
</html>
